# Cloud Build substitution variables — set these in the Cloud Build Trigger settings:
#   _POSTHOG_KEY         = phc_xxxxx            (PostHog project API key)
#   _SENTRY_DSN          = https://xxx@sentry.io/xxx  (Sentry DSN)
#   _PADDLE_PRO_MONTHLY  = pri_xxxxxx           (Paddle price ID — Pro monthly)
#   _PADDLE_PRO_ANNUAL   = pri_xxxxxx           (Paddle price ID — Pro annual)
#   _PADDLE_CLINIC_MONTHLY  = pri_xxxxxx        (Paddle price ID — Employer Clinic monthly)
#   _PADDLE_CLINIC_ANNUAL   = pri_xxxxxx        (Paddle price ID — Employer Clinic annual)
#   _PADDLE_GROWTH_MONTHLY  = pri_xxxxxx        (Paddle price ID — Employer Growth monthly)
#   _PADDLE_GROWTH_ANNUAL   = pri_xxxxxx        (Paddle price ID — Employer Growth annual)
#   _PADDLE_DEPT_MONTHLY    = pri_xxxxxx        (Paddle price ID — Employer Dept monthly)
#   _PADDLE_DEPT_ANNUAL     = pri_xxxxxx        (Paddle price ID — Employer Dept annual)
#   _PADDLE_HOSP_MONTHLY    = pri_xxxxxx        (Paddle price ID — Employer Hospital monthly)
#   _PADDLE_HOSP_ANNUAL     = pri_xxxxxx        (Paddle price ID — Employer Hospital annual)
#
# If not set, these default to empty string.
# Paddle features require all 10 price IDs — leave blank to disable payments until ready.

substitutions:
  _POSTHOG_KEY: "phc_p9y9o7LUUmS6bKxHGp3ZWSe2AADhSq2PaWJMMCcUdCWo"
  _SENTRY_DSN: "https://f2a8cfb2d5ba7df0b97ebd4c24e59b1e@o4511560514338816.ingest.de.sentry.io/4511560521482320"
  _PADDLE_PRO_MONTHLY: ""
  _PADDLE_PRO_ANNUAL: ""
  _PADDLE_CLINIC_MONTHLY: ""
  _PADDLE_CLINIC_ANNUAL: ""
  _PADDLE_GROWTH_MONTHLY: ""
  _PADDLE_GROWTH_ANNUAL: ""
  _PADDLE_DEPT_MONTHLY: ""
  _PADDLE_DEPT_ANNUAL: ""
  _PADDLE_HOSP_MONTHLY: ""
  _PADDLE_HOSP_ANNUAL: ""

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'me-central1-docker.pkg.dev/project-38d955b0-84e7-44b6-8b5/hayyamed-pro/app:$BUILD_ID'
      - '-t'
      - 'me-central1-docker.pkg.dev/project-38d955b0-84e7-44b6-8b5/hayyamed-pro/app:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=https://ulevibytaxocdvdfmfaq.supabase.co'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZXZpYnl0YXhvY2R2ZGZtZmFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjA3OTgsImV4cCI6MjA5NjI5Njc5OH0.AmoNuAClh1RBnnWldrzQ773SakdOIGuJYErZGHbek-w'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=https://hayyamed.pro'
      - '--build-arg'
      - 'NEXT_PUBLIC_VAPID_PUBLIC_KEY=BKmyU-09Tox9-Z9V21e26-jP2I4paR3QuBjRG4gdnLS9UVauqYeGXO2l5OqBTGrk6Ga-m_gzX7jw5syPd87k9hw'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_KEY=$_POSTHOG_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_SENTRY_DSN=$_SENTRY_DSN'
      - '--cache-from'
      - 'me-central1-docker.pkg.dev/project-38d955b0-84e7-44b6-8b5/hayyamed-pro/app:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - 'me-central1-docker.pkg.dev/project-38d955b0-84e7-44b6-8b5/hayyamed-pro/app'

  # All secrets injected at runtime from Secret Manager — never baked into image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'hayyamed-pro'
      - '--image=me-central1-docker.pkg.dev/project-38d955b0-84e7-44b6-8b5/hayyamed-pro/app:$BUILD_ID'
      - '--region=me-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--min-instances=1'
      - '--max-instances=10'
      - >-
        --set-env-vars=VAPID_SUBJECT=mailto:support@hayyamed.pro,SUPPORT_EMAIL=support@hayyamed.pro,ADMIN_NOTIFICATION_EMAIL=admin@hayyamed.pro,NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com,GOOGLE_CLOUD_PROJECT=project-38d955b0-84e7-44b6-8b5,VERTEX_REGION=us-east5,PADDLE_PRO_MONTHLY_PRICE_ID=$_PADDLE_PRO_MONTHLY,PADDLE_PRO_ANNUAL_PRICE_ID=$_PADDLE_PRO_ANNUAL,PADDLE_EMPLOYER_CLINIC_MONTHLY_PRICE_ID=$_PADDLE_CLINIC_MONTHLY,PADDLE_EMPLOYER_CLINIC_ANNUAL_PRICE_ID=$_PADDLE_CLINIC_ANNUAL,PADDLE_EMPLOYER_GROWTH_MONTHLY_PRICE_ID=$_PADDLE_GROWTH_MONTHLY,PADDLE_EMPLOYER_GROWTH_ANNUAL_PRICE_ID=$_PADDLE_GROWTH_ANNUAL,PADDLE_EMPLOYER_DEPT_MONTHLY_PRICE_ID=$_PADDLE_DEPT_MONTHLY,PADDLE_EMPLOYER_DEPT_ANNUAL_PRICE_ID=$_PADDLE_DEPT_ANNUAL,PADDLE_EMPLOYER_HOSP_MONTHLY_PRICE_ID=$_PADDLE_HOSP_MONTHLY,PADDLE_EMPLOYER_HOSP_ANNUAL_PRICE_ID=$_PADDLE_HOSP_ANNUAL
      - >-
        --set-secrets=SUPABASE_SERVICE_ROLE_KEY=hayyamed-pro-service-role-key:latest,POSTMARK_API_TOKEN=hayyamed-pro-postmark-key:latest,POSTMARK_WEBHOOK_TOKEN=hayyamed-pro-postmark-webhook-token:latest,CRON_SECRET=hayyamed-pro-cron-secret:latest,VAPID_PRIVATE_KEY=hayyamed-pro-vapid-private:latest,PADDLE_API_KEY=hayyamed-pro-paddle-key:latest,PADDLE_WEBHOOK_SECRET=hayyamed-pro-paddle-webhook:latest,UPSTASH_REDIS_REST_URL=hayyamed-pro-upstash-url:latest,UPSTASH_REDIS_REST_TOKEN=hayyamed-pro-upstash-token:latest

images:
  - 'me-central1-docker.pkg.dev/project-38d955b0-84e7-44b6-8b5/hayyamed-pro/app'

options:
  logging: CLOUD_LOGGING_ONLY
